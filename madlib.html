<!DOCTYPE html>
<html>
<head>
    <title>Flask Mad Libs</title>
    <style>
        body { 
            background-color: #f0f4f8; 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .story-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 500px; 
            text-align: center;
            border: 5px solid #ffcc00;
        }
        h1 { color: #ff6600; }
        p { font-size: 1.2rem; line-height: 1.6; color: #333; }
        .btn { 
            display: inline-block; 
            margin-top: 20px; 
            padding: 10px 20px; 
            background-color: #ff6600; 
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold;
        }
        .btn:hover { background-color: #e65c00; }
    </style>
</head>
<body>
    <div class="story-card">
        <h1>✨ Your Mad Lib Story ✨</h1>
        <p>{{ story }}</p>
        <a href="/madlib" class="btn">Generate Another! 🔄</a>
        <br><br>
        <a href="/" style="color: #999; font-size: 0.8rem;">Home</a>
    </div>
</body>
</html>
